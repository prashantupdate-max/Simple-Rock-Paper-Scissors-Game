<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="app">

        <!-- Header -->

        <div class="header">

            <h1>Rock Paper Scissors</h1>

            <div class="header-right">

                <button id="themeToggle">
                    🌙 Dark Mode
                </button>

                <div class="score">

                    <div class="score-box">

                        <span>You</span>

                        <h2 id="playerScore">
                            0
                        </h2>

                    </div>

                    <div class="score-box">

                        <span>CPU</span>

                        <h2 id="computerScore">
                            0
                        </h2>

                    </div>

                </div>

            </div>

        </div>

        <!-- Arena -->

        <div class="arena">

            <div class="player-side">

                <p>You</p>

                <div class="choice-card"
                    id="playerChoice">

                    ❔

                </div>

            </div>

            <div class="center">

                <div class="vs">
                    VS
                </div>

                <h2 id="resultText">

                    Choose a Move

                </h2>

                <p id="subResult">

                    First round begins now

                </p>

            </div>

            <div class="computer-side">

                <p>Computer</p>

                <div class="choice-card"
                    id="computerChoice">

                    ❔

                </div>

            </div>

        </div>

        <!-- Controls -->

        <div class="controls">

            <button class="move-btn rock"
                data-choice="rock">

                🪨

                <span>
                    Rock
                </span>

            </button>

            <button class="move-btn paper"
                data-choice="paper">

                📄

                <span>
                    Paper
                </span>

            </button>

            <button class="move-btn scissors"
                data-choice="scissors">

                ✂️

                <span>
                    Scissors
                </span>

            </button>

        </div>

        <!-- Stats -->

        <div class="stats">

            <div class="stat">

                <span>Wins</span>

                <h3 id="wins">
                    0
                </h3>

            </div>

            <div class="stat">

                <span>Draws</span>

                <h3 id="draws">
                    0
                </h3>

            </div>

            <div class="stat">

                <span>Losses</span>

                <h3 id="losses">
                    0
                </h3>

            </div>

        </div>

        <!-- Bottom -->

        <div class="bottom">

            <button id="resetBtn">

                Reset Game

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
